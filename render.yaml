# Render Blueprint: https://render.com/docs/blueprint-spec
# 1) ادفع المشروع على GitHub واربطه من Render → New → Blueprint
# 2) في لوحة Render → Environment أضف:
#    - PUBLIC_URL = https://اسم-خدمتك.onrender.com (نفس الرابط العام أعلاه؛ مهم لروابط الـ QR والمانيفست)
#    - DASHBOARD_USER / DASHBOARD_PASS
#    (Render يضيف RENDER_EXTERNAL_URL تلقائياً؛ PUBLIC_URL أوضح لو غيّرت الدومين لاحقاً)
# 3) بعد أول نشر ناجح: من Shell يمكن تشغيل npm run seed (يستخدم PUBLIC_URL من البيئة)
#
# تنبيه الخطة المجانية: القرص مؤقت — لو السيرفر نام ممكن تضيع بيانات SQLite.
#    للإنتاج: قرص دائم (Render Disk) أو PostgreSQL.

services:
  - type: web
    name: qr-one-time
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: USE_HTTPS
        value: "0"
      - key: HTTP_EXTRA_PORT
        value: "0"
      - key: HOST
        value: "0.0.0.0"
      # املأ من Dashboard → Environment (انسخ الرابط من أعلى صفحة الخدمة، بدون / في النهاية)
      - key: PUBLIC_URL
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
