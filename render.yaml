# Render Blueprint: https://render.com/docs/blueprint-spec
# 1) ادفع المشروع على GitHub واربطه من Render → New → Blueprint
# 2) في لوحة Render → Environment أضف:
#    - PUBLIC_URL = https://اسم-خدمتك.onrender.com (نفس الرابط العام أعلاه؛ مهم لروابط الـ QR والمانيفست)
#    - DASHBOARD_USER / DASHBOARD_PASS
#    (Render يضيف RENDER_EXTERNAL_URL تلقائياً؛ PUBLIC_URL أوضح لو غيّرت الدومين لاحقاً)
# 3) بعد أول نشر ناجح: من Shell شغّل npm run seed (يستخدم PUBLIC_URL؛ أو SEED_SLOT_RANGES مثل 4110:75,5105:95 أو SEED_CODE_COUNT)
#
# --- قرص دائم (مدفوع) لـ SQLite ---
# من الخدمة في Render: Disks → Add Disk → Mount path مثلاً /var/data → حجم 1GB+
# ثم Environment → أضف DATA_DIR=/var/data (نفس مسار الـ mount بالضبط)
# أعد نشر الخدمة ثم من Shell: npm run seed
# كده app.db + مجلد qrcodes + manifest.json كلهم تحت نفس القرص (ما يضيعوا مع إعادة التشغيل).

services:
  - type: web
    name: qr-one-time
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: USE_HTTPS
        value: "0"
      - key: HTTP_EXTRA_PORT
        value: "0"
      - key: HOST
        value: "0.0.0.0"
      # املأ من Dashboard → Environment (انسخ الرابط من أعلى صفحة الخدمة، بدون / في النهاية)
      - key: PUBLIC_URL
        sync: false
      # بعد إضافة قرص دائم (mount مثلاً /var/data): اضبط القيمة نفس الـ mountPath
      - key: DATA_DIR
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
